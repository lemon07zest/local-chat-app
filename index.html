<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LocalChat — Real-Time Messaging</title>
  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3350;
      --blue:      #4f8ef7;
      --blue2:     #3a6fd8;
      --green:     #3ecf8e;
      --red:       #f87171;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    12px;
      --font:      'Segoe UI', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Login Screen ─────────────────────────────── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 4px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--blue);
    }

    .btn-primary {
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: var(--font);
    }

    .btn-primary:hover { background: var(--blue2); }
    .btn-primary:active { transform: scale(0.98); }

    .server-hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    /* ── Chat Screen ──────────────────────────────── */
    #chat-screen {
      display: none;
      width: 100%;
      height: 100vh;
      max-width: 1100px;
      padding: 16px;
      gap: 16px;
    }

    #chat-screen.active {
      display: flex;
    }

    /* ── Sidebar ──────────────────────────────────── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--border);
    }

    .app-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--blue);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .connection-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      margin-top: 6px;
      display: inline-block;
    }

    .connected { background: rgba(62,207,142,0.15); color: var(--green); }
    .disconnected { background: rgba(248,113,113,0.15); color: var(--red); }
    .connecting { background: rgba(79,142,247,0.15); color: var(--blue); }

    .sidebar-section {
      padding: 14px 16px 8px;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .user-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      transition: background 0.15s;
    }

    .user-item:hover { background: var(--surface2); }

    .user-item.me { color: var(--blue); font-weight: 600; }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .online-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-left: auto;
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Main Chat ────────────────────────────────── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-width: 0;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-title {
      font-size: 16px;
      font-weight: 600;
    }

    .user-count-badge {
      font-size: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: 20px;
      color: var(--muted);
    }

    /* ── Messages ─────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 72%;
      gap: 3px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.own {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.other {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 4px;
    }

    .message-author {
      font-size: 11px;
      font-weight: 600;
      color: var(--blue);
    }

    .message-time {
      font-size: 10px;
      color: var(--muted);
    }

    .message-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .message.own .message-bubble {
      background: var(--blue);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.other .message-bubble {
      background: var(--surface2);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* System messages */
    .system-message {
      align-self: center;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface2);
      padding: 4px 14px;
      border-radius: 20px;
      margin: 6px 0;
      animation: fadeIn 0.2s ease;
    }

    /* Typing indicator */
    #typing-indicator {
      min-height: 22px;
      padding: 0 20px 4px;
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Input Area ───────────────────────────────── */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #message-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      resize: none;
      max-height: 120px;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    #message-input:focus { border-color: var(--blue); }

    #message-input::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--blue);
      border: none;
      border-radius: 10px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--blue2); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 680px) {
      .sidebar { display: none; }
      #chat-screen { padding: 0; }
      .chat-main { border-radius: 0; border: none; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN SCREEN ─────────────────────────────── -->
<div id="login-screen">
  <div class="logo">💬</div>
  <div class="login-title">LocalChat</div>
  <div class="login-subtitle">Real-time messaging for your local network.<br>No internet required.</div>

  <div class="login-card">
    <div class="input-group">
      <label for="username-input">Your Name</label>
      <input type="text" id="username-input" placeholder="Enter your name..." maxlength="24" autocomplete="off"/>
    </div>
    <div class="input-group">
      <label for="server-input">Server Address</label>
      <input type="text" id="server-input" value="localhost:8765" placeholder="192.168.x.x:8765"/>
    </div>
    <button class="btn-primary" id="join-btn" onclick="joinChat()">Join Chat</button>
    <div class="server-hint">Run server.py first, then share your IP with friends on the same network.</div>
  </div>
</div>

<!-- ── CHAT SCREEN ───────────────────────────────── -->
<div id="chat-screen">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="app-name">💬 LocalChat</div>
      <div class="connection-badge connecting" id="conn-badge">Connecting...</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Online Users</div>
    </div>
    <ul class="user-list" id="user-list"></ul>
    <div class="sidebar-footer" id="sidebar-footer">0 users online</div>
  </div>

  <!-- Main Chat -->
  <div class="chat-main">
    <div class="chat-header">
      <div class="chat-header-left">
        <span>🌐</span>
        <span class="chat-title">General Chat</span>
      </div>
      <span class="user-count-badge" id="user-count-badge">0 online</span>
    </div>

    <div id="messages"></div>
    <div id="typing-indicator"></div>

    <div class="input-area">
      <textarea id="message-input" placeholder="Type a message..." rows="1" maxlength="500"
        onkeydown="handleKeyDown(event)" oninput="handleTyping()"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
  // ── State ──────────────────────────────────────────
  let ws = null;
  let myUsername = "";
  let typingTimer = null;
  let isTyping = false;

  // Avatar colors
  const COLORS = [
    "#4f8ef7","#3ecf8e","#f59e0b","#ec4899",
    "#8b5cf6","#06b6d4","#f97316","#10b981"
  ];

  function getColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return COLORS[Math.abs(hash) % COLORS.length];
  }

  function getInitials(name) {
    return name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
  }

  // ── Join ───────────────────────────────────────────
  function joinChat() {
    const nameInput = document.getElementById("username-input");
    const serverInput = document.getElementById("server-input");
    const name = nameInput.value.trim();
    const server = serverInput.value.trim() || "localhost:8765";

    if (!name) { nameInput.focus(); return; }

    document.getElementById("login-screen").style.display = "none";
    document.getElementById("chat-screen").classList.add("active");

    connectWebSocket(name, server);
  }

  // ── WebSocket ──────────────────────────────────────
  function connectWebSocket(name, server) {
    const url = `ws://${server}`;
    setBadge("connecting", "Connecting...");

    try {
      ws = new WebSocket(url);
    } catch(e) {
      setBadge("disconnected", "Failed");
      addSystemMessage("Could not connect to server.");
      return;
    }

    ws.onopen = () => {
      ws.send(JSON.stringify({ type: "join", username: name }));
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      handleMessage(data);
    };

    ws.onclose = () => {
      setBadge("disconnected", "Disconnected");
      addSystemMessage("Connection lost. Please refresh to reconnect.");
      document.getElementById("send-btn").disabled = true;
      document.getElementById("message-input").disabled = true;
    };

    ws.onerror = () => {
      setBadge("disconnected", "Error");
    };
  }

  // ── Message Handler ────────────────────────────────
  function handleMessage(data) {
    switch(data.type) {

      case "joined":
        myUsername = data.username;
        setBadge("connected", "Connected");
        document.getElementById("send-btn").disabled = false;
        addSystemMessage(data.message);
        document.getElementById("message-input").focus();
        break;

      case "message":
        clearTypingFor(data.username);
        appendMessage(data);
        break;

      case "system":
        addSystemMessage(data.message);
        break;

      case "user_list":
        updateUserList(data.users, data.count);
        break;

      case "typing":
        handleTypingIndicator(data.username, data.is_typing);
        break;
    }
  }

  // ── Append Message ─────────────────────────────────
  function appendMessage(data) {
    const isOwn = data.username === myUsername;
    const container = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = `message ${isOwn ? "own" : "other"}`;

    div.innerHTML = `
      <div class="message-meta">
        ${!isOwn ? `<span class="message-author" style="color:${getColor(data.username)}">${escHtml(data.username)}</span>` : ""}
        <span class="message-time">${data.timestamp}</span>
      </div>
      <div class="message-bubble">${escHtml(data.text)}</div>
    `;

    container.appendChild(div);
    scrollToBottom();
  }

  // ── System Message ─────────────────────────────────
  function addSystemMessage(text) {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "system-message";
    div.textContent = text;
    container.appendChild(div);
    scrollToBottom();
  }

  // ── User List ──────────────────────────────────────
  function updateUserList(users, count) {
    const list = document.getElementById("user-list");
    list.innerHTML = "";

    users.forEach(name => {
      const li = document.createElement("li");
      li.className = `user-item ${name === myUsername ? "me" : ""}`;

      const color = getColor(name);
      li.innerHTML = `
        <div class="user-avatar" style="background:${color}22;color:${color}">
          ${getInitials(name)}
        </div>
        <span>${escHtml(name)}${name === myUsername ? " (you)" : ""}</span>
        <div class="online-dot"></div>
      `;
      list.appendChild(li);
    });

    document.getElementById("sidebar-footer").textContent = `${count} user${count !== 1 ? "s" : ""} online`;
    document.getElementById("user-count-badge").textContent = `${count} online`;
  }

  // ── Send Message ───────────────────────────────────
  function sendMessage() {
    const input = document.getElementById("message-input");
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({ type: "message", text }));
    input.value = "";
    input.style.height = "auto";
    stopTyping();
  }

  function handleKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Typing Indicator ───────────────────────────────
  const typingUsers = new Set();

  function handleTyping() {
    // Auto-resize textarea
    const input = document.getElementById("message-input");
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";

    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    if (!isTyping) {
      isTyping = true;
      ws.send(JSON.stringify({ type: "typing", is_typing: true }));
    }

    clearTimeout(typingTimer);
    typingTimer = setTimeout(stopTyping, 2000);
  }

  function stopTyping() {
    if (isTyping && ws && ws.readyState === WebSocket.OPEN) {
      isTyping = false;
      ws.send(JSON.stringify({ type: "typing", is_typing: false }));
    }
    clearTimeout(typingTimer);
  }

  function handleTypingIndicator(username, typing) {
    if (username === myUsername) return;
    if (typing) {
      typingUsers.add(username);
    } else {
      typingUsers.delete(username);
    }
    updateTypingDisplay();
  }

  function clearTypingFor(username) {
    typingUsers.delete(username);
    updateTypingDisplay();
  }

  function updateTypingDisplay() {
    const el = document.getElementById("typing-indicator");
    if (typingUsers.size === 0) {
      el.textContent = "";
    } else if (typingUsers.size === 1) {
      el.textContent = `${[...typingUsers][0]} is typing...`;
    } else {
      el.textContent = `${typingUsers.size} people are typing...`;
    }
  }

  // ── Helpers ────────────────────────────────────────
  function setBadge(cls, text) {
    const badge = document.getElementById("conn-badge");
    badge.className = `connection-badge ${cls}`;
    badge.textContent = text;
  }

  function scrollToBottom() {
    const m = document.getElementById("messages");
    m.scrollTop = m.scrollHeight;
  }

  function escHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Enter key on login ─────────────────────────────
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("username-input").addEventListener("keydown", e => {
      if (e.key === "Enter") joinChat();
    });
    document.getElementById("server-input").addEventListener("keydown", e => {
      if (e.key === "Enter") joinChat();
    });
  });
</script>
</body>
</html>
